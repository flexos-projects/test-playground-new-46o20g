<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Coming Soon — Built with FlexOS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }

    :root {
      --fg: oklch(93% 0.005 260);
      --fg-secondary: oklch(58% 0.008 260);
      --fg-muted: oklch(38% 0.006 260);
      --bg: oklch(10% 0.005 260);
      --surface: oklch(15% 0.006 260);
      --border: oklch(22% 0.005 260);
      --accent: oklch(62% 0.18 265);
      --accent-muted: oklch(62% 0.18 265 / 0.15);
    }

    html {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.3;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--accent-muted);
      margin-bottom: 2rem;
    }

    .logo svg {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--fg-secondary);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      margin: 0 auto 2.5rem;
      opacity: 0.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.875rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg-muted);
      font-size: 0.75rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .badge:hover {
      border-color: var(--accent);
      color: var(--fg-secondary);
    }

    .badge svg {
      width: 14px;
      height: 14px;
      color: var(--accent);
    }

    /* Glow behind logo */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--accent-muted) 0%, transparent 70%);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
        <line x1="12" y1="22" x2="12" y2="15.5"/>
        <polyline points="22 8.5 12 15.5 2 8.5"/>
        <polyline points="2 15.5 12 8.5 22 15.5"/>
        <line x1="12" y1="2" x2="12" y2="8.5"/>
      </svg>
    </div>
    <h1>Something's coming</h1>
    <p class="subtitle">We're building something new. Check back soon.</p>
    <div class="divider"></div>
    <a href="https://flexos.dev" target="_blank" rel="noopener" class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
      </svg>
      Built with FlexOS
    </a>
  </div>
</body>
</html>
